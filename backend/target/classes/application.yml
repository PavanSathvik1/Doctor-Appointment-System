server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: hms

  # ─── DataSource (MySQL) ───
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/hms_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  # ─── JPA / Hibernate ───
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # ─── Flyway ───
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ─── Redis ───
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  # ─── Elasticsearch ───
  elasticsearch:
    uris: http://${ELASTICSEARCH_HOST:localhost}:${ELASTICSEARCH_PORT:9200}

  # ─── Mail (Mailtrap for dev) ───
  mail:
    host: ${MAIL_HOST:sandbox.smtp.mailtrap.io}
    port: ${MAIL_PORT:2525}
    username: 1fcae99f943094
    password: d22c392bb6029b
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ─── Thymeleaf ───
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    cache: true

  # ─── Async ───
  task:
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100
      thread-name-prefix: hms-async-

# ─── Application Custom Properties ───
app:
  jwt:
    secret: ${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgc2VjdXJlIGp3dCBzZWNyZXQga2V5IGZvciBobXMgYXBwbGljYXRpb24=}
    expiry-ms: ${JWT_EXPIRY_MS:1800000}
  refresh-token:
    expiry-days: ${REFRESH_TOKEN_EXPIRY_DAYS:7}
  aws:
    access-key: ${AWS_ACCESS_KEY:}
    secret-key: ${AWS_SECRET_KEY:}
    region: ${AWS_REGION:ap-south-1}
    s3-bucket: ${AWS_S3_BUCKET:hms-prescriptions}
    presigned-url-expiry-minutes: 15
  scheduler:
    reminder:
      cron: "0 0 * * * *"
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ─── Razorpay ───
razorpay:
  key:
    id: ${RAZORPAY_KEY_ID:rzp_test_FgWx66JzGQElwK}
    secret: ${RAZORPAY_KEY_SECRET:m0QtWLyIB4nLLoQhkVH5jDLN}

# ─── Springdoc OpenAPI (Swagger) ───
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# ─── Logging ───
logging:
  level:
    com.hms: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
